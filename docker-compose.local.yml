services:
  postgres:
    image: dockerproxy.com/library/postgres:15-alpine
    container_name: aiworkos-postgres
    environment:
      POSTGRES_DB: ai_work_os
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: aiworkos_secret_2026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_work_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: dockerproxy.com/library/redis:7-alpine
    container_name: aiworkos-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
