version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aiworkos-postgres
    environment:
      POSTGRES_DB: ai_work_os
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: aiworkos_secret_2026
    ports:
      - "5433:5432"  # Changed from 5432 to 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_work_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aiworkos-redis
    ports:
      - "6380:6379"  # Changed from 6379 to 6380
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiworkos-backend
    ports:
      - "8001:8000"  # Changed from 8000 to 8001
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:aiworkos_secret_2026@postgres:5432/ai_work_os
      - DATABASE_URL_SYNC=postgresql://admin:aiworkos_secret_2026@postgres:5432/ai_work_os
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
      - JWT_SECRET=${JWT_SECRET:-aiworkos-jwt-secret-change-in-production}
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiworkos-frontend
    ports:
      - "3001:3000"  # Changed from 3000 to 3001
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
