services:
  postgres:
    image: docker.mirrors.ustc.edu.cn/library/postgres:15-alpine
    container_name: aiworkos-postgres
    environment:
      POSTGRES_DB: ai_work_os
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: aiworkos_secret_2026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_work_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: docker.mirrors.ustc.edu.cn/library/redis:7-alpine
    container_name: aiworkos-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: python:3.11-slim
    container_name: aiworkos-backend
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:aiworkos_secret_2026@postgres:5432/ai_work_os
      - DATABASE_URL_SYNC=postgresql://admin:aiworkos_secret_2026@postgres:5432/ai_work_os
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
      - JWT_SECRET=${JWT_SECRET:-aiworkos-jwt-secret-change-in-production}
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: node:20-alpine
    container_name: aiworkos-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: >
      sh -c "npm install -g pnpm --registry https://registry.npmmirror.com &&
             pnpm install --registry https://registry.npmmirror.com &&
             pnpm dev"

volumes:
  postgres_data:
  redis_data:
